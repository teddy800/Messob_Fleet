# ============================================================================
# MESSOB Fleet Management System - Nginx Load Balancer Configuration
# NFR-1.3: Horizontal Scaling Configuration
# ============================================================================
# This configuration enables horizontal scaling with multiple Odoo instances
# ============================================================================

# Upstream configuration for Odoo instances
upstream odoo_backend {
    # Load balancing method: least_conn (least connections)
    # Alternatives: ip_hash (session persistence), round_robin (default)
    least_conn;
    
    # Odoo instance 1
    server odoo1:8069 max_fails=3 fail_timeout=30s;
    
    # Odoo instance 2
    server odoo2:8069 max_fails=3 fail_timeout=30s;
    
    # Odoo instance 3 (optional - add more as needed)
    # server odoo3:8069 max_fails=3 fail_timeout=30s;
    
    # Health check configuration
    # Nginx Plus feature - for open source, use external health checks
    # check interval=3000 rise=2 fall=3 timeout=1000;
}

# Upstream for long-polling (real-time updates)
upstream odoo_longpolling {
    server odoo1:8072;
    server odoo2:8072;
    # server odoo3:8072;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Main server block
server {
    listen 80;
    listen [::]:80;
    server_name fleet.messob.et;  # Replace with your domain
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleet.messob.et;  # Replace with your domain
    
    # SSL/TLS Configuration (TLS 1.3 - NFR-3.3)
    ssl_certificate /etc/nginx/ssl/fleet.messob.et.crt;
    ssl_certificate_key /etc/nginx/ssl/fleet.messob.et.key;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Logging
    access_log /var/log/nginx/fleet_access.log combined;
    error_log /var/log/nginx/fleet_error.log warn;
    
    # Client body size (for file uploads)
    client_max_body_size 100M;
    client_body_timeout 300s;
    
    # Proxy timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    
    # Connection limits
    limit_conn conn_limit 10;
    
    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Disable buffering for long-polling
    proxy_buffering off;
    proxy_request_buffering off;
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Long-polling for real-time updates
    location /longpolling {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # API endpoints with rate limiting
    location ~ ^/odoo/fms/(fuel-pump|gps|api)/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://odoo_backend;
        proxy_redirect off;
    }
    
    # Static files (served directly by Nginx for performance)
    location ~* ^/web/static/ {
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo_backend;
        add_header Cache-Control "public, immutable";
    }
    
    # Frontend static files
    location /frontend/ {
        alias /var/www/fleet-frontend/;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Main Odoo application
    location / {
        limit_req zone=web_limit burst=50 nodelay;
        proxy_pass http://odoo_backend;
        proxy_redirect off;
        
        # Enable gzip compression
        gzip on;
        gzip_types text/css text/javascript application/javascript application/json;
        gzip_min_length 1000;
    }
    
    # WebSocket support (for future features)
    location /websocket {
        proxy_pass http://odoo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Monitoring/Admin server (internal only)
server {
    listen 8080;
    server_name localhost;
    
    # Allow only internal IPs
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    
    # Nginx status page
    location /nginx_status {
        stub_status on;
        access_log off;
    }
    
    # Upstream health check
    location /upstream_status {
        access_log off;
        return 200 "Check upstream manually\n";
        add_header Content-Type text/plain;
    }
}
