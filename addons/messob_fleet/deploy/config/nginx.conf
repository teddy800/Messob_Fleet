# ---------------------------------------------------------------------------
# MESSOB Fleet Management System — Nginx Config
# Reverse proxy for Odoo + SSL termination
# ---------------------------------------------------------------------------

upstream odoo {
    server odoo:8069;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name your-domain.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Max upload size (for attachments)
    client_max_body_size 200m;

    # Proxy to Odoo
    location / {
        proxy_pass         http://odoo;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
    }

    # Odoo longpolling (live chat / notifications)
    location /longpolling {
        proxy_pass http://odoo:8072;
    }

    # Cache static files
    location ~* /web/static/ {
        proxy_pass         http://odoo;
        proxy_cache_valid  200 90d;
        expires            864000;
        add_header         Cache-Control "public, immutable";
    }

    # CORS headers for API endpoints (frontend team needs this)
    location /api/ {
        proxy_pass http://odoo;
        add_header Access-Control-Allow-Origin  "https://your-frontend-domain.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
