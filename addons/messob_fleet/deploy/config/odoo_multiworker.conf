# ============================================================================
# MESSOB Fleet Management System - Odoo Multi-Worker Configuration
# NFR-1.3: Horizontal Scaling Configuration
# ============================================================================
# This configuration enables Odoo to run with multiple worker processes
# for improved performance and horizontal scaling capability
# ============================================================================

[options]
# ── Database Configuration ──
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = fleet_management
db_maxconn = 64
db_template = template0

# ── Multi-Worker Configuration (NFR-1.3) ──
# Number of worker processes
# Formula: (CPU cores * 2) + 1
# For 4 CPU cores: (4 * 2) + 1 = 9 workers
workers = 9

# Maximum number of requests a worker will process before restarting
# Helps prevent memory leaks
limit_request = 8192

# Maximum allowed virtual memory per worker (in bytes)
# 640 MB per worker
limit_memory_soft = 671088640

# Hard limit for virtual memory per worker
# 768 MB per worker (worker will be killed if exceeded)
limit_memory_hard = 805306368

# Maximum time (in seconds) a request can take before being killed
limit_time_cpu = 600

# Maximum time (in seconds) a request can take (real time)
limit_time_real = 1200

# Maximum time (in seconds) a cron job can take
limit_time_real_cron = 3600

# ── Long-Polling Configuration ──
# Port for long-polling (real-time updates)
longpolling_port = 8072

# ── Performance Tuning ──
# Maximum number of cron threads
# Should be less than workers
max_cron_threads = 2

# Enable/disable database listing
list_db = False

# Proxy mode (when behind Nginx)
proxy_mode = True

# ── Server Configuration ──
http_interface = 0.0.0.0
http_port = 8069
http_enable = True

# ── Logging Configuration ──
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = :INFO
log_db = False
log_db_level = warning

# ── Session Configuration ──
# Session storage (use Redis for multi-instance setup)
# Uncomment when Redis is configured
# session_store = redis
# session_redis_host = redis
# session_redis_port = 6379
# session_redis_dbindex = 1
# session_redis_password = your_redis_password

# ── File Storage ──
data_dir = /var/lib/odoo

# ── Addons Path ──
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

# ── Security ──
admin_passwd = $pbkdf2-sha512$25000$...  # Change this!

# ── Email Configuration (Optional) ──
# email_from = noreply@messob.et
# smtp_server = smtp.gmail.com
# smtp_port = 587
# smtp_ssl = False
# smtp_user = your_email@gmail.com
# smtp_password = your_app_password

# ── Gevent Mode (Alternative to workers) ──
# Uncomment to use gevent instead of prefork workers
# server_wide_modules = base,web,gevent
# workers = 0
# max_cron_threads = 1

# ── Performance Monitoring ──
# Enable profiling (development only)
# enable_profiling = False

# ── Translation ──
load_language = en_US
translate_modules = all

# ── Development Settings (Disable in production!) ──
# dev_mode = reload,qweb,werkzeug,xml
# test_enable = False
# test_file = False
# test_tags = None

# ── Additional Options ──
# Without demo data
without_demo = all

# Timezone
timezone = Africa/Addis_Ababa

# ============================================================================
# SCALING NOTES:
# ============================================================================
# 
# 1. VERTICAL SCALING (Single Server):
#    - Increase 'workers' based on CPU cores
#    - Increase memory limits based on available RAM
#    - Monitor with: ps aux | grep odoo
#
# 2. HORIZONTAL SCALING (Multiple Servers):
#    - Run multiple Odoo instances with this config
#    - Use Nginx load balancer (nginx_load_balancer.conf)
#    - Share file storage (NFS or S3-compatible storage)
#    - Use Redis for session storage (uncomment session_* options)
#    - Use PgBouncer for database connection pooling
#
# 3. DATABASE CONNECTION POOLING:
#    - Install PgBouncer between Odoo and PostgreSQL
#    - Update db_host to point to PgBouncer
#    - Reduces database connection overhead
#
# 4. MONITORING:
#    - CPU usage: top, htop
#    - Memory: free -h, vmstat
#    - Odoo logs: tail -f /var/log/odoo/odoo.log
#    - Database: pg_stat_activity
#    - Nginx: /nginx_status endpoint
#
# 5. PERFORMANCE TUNING:
#    - Adjust workers based on load
#    - Monitor memory usage per worker
#    - Tune limit_request for memory management
#    - Use Redis for session storage in multi-instance setup
#    - Enable database query logging for slow queries
#
# ============================================================================
