# ---------------------------------------------------------------------------
# MESSOB Fleet Management System
# Nginx Configuration with TLS/HTTPS (NFR-3.3)
# Description: Production-ready Nginx configuration with SSL/TLS 1.3
#
# Features:
#   - TLS 1.3 enforcement
#   - Strong cipher suites
#   - HSTS (HTTP Strict Transport Security)
#   - SSL session caching
#   - OCSP stapling
#   - Security headers
# ---------------------------------------------------------------------------

# Upstream Odoo backend servers
upstream odoo_backend {
    server odoo18:8069;
    # Add more servers for load balancing:
    # server odoo18_2:8069;
    # server odoo18_3:8069;
}

# Upstream Odoo longpolling
upstream odoo_longpolling {
    server odoo18:8072;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name fleet.mesob.et www.fleet.mesob.et;
    
    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleet.mesob.et www.fleet.mesob.et;
    
    # =========================================================================
    # SSL/TLS CONFIGURATION (NFR-3.3: TLS 1.3)
    # =========================================================================
    
    # SSL certificates (Let's Encrypt or custom)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # TLS 1.3 only (most secure)
    ssl_protocols TLSv1.3;
    
    # Strong cipher suites for TLS 1.3
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256';
    ssl_prefer_server_ciphers off;
    
    # SSL session caching for performance
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP stapling for certificate validation
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Diffie-Hellman parameters for perfect forward secrecy
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    
    # =========================================================================
    # SECURITY HEADERS (NFR-3.5: OWASP Top 10 Protection)
    # =========================================================================
    
    # HTTP Strict Transport Security (HSTS)
    # Force HTTPS for 1 year, including subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'self';" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (formerly Feature Policy)
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    
    # =========================================================================
    # LOGGING
    # =========================================================================
    
    access_log /var/log/nginx/odoo_access.log;
    error_log /var/log/nginx/odoo_error.log;
    
    # =========================================================================
    # PROXY SETTINGS
    # =========================================================================
    
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;
    
    # Proxy headers
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
    
    # =========================================================================
    # RATE LIMITING (NFR-3: Security)
    # =========================================================================
    
    # Define rate limit zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    
    # =========================================================================
    # LOCATIONS
    # =========================================================================
    
    # Odoo longpolling
    location /longpolling {
        proxy_pass http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # WebSocket support for real-time features
    location /websocket {
        proxy_pass http://odoo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
    
    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://odoo_backend;
    }
    
    # Login endpoint with strict rate limiting
    location /web/session/authenticate {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://odoo_backend;
    }
    
    # Static files caching
    location ~* /web/static/ {
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo_backend;
    }
    
    # Main Odoo backend
    location / {
        proxy_pass http://odoo_backend;
        proxy_redirect off;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # =========================================================================
    # GZIP COMPRESSION
    # =========================================================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # =========================================================================
    # CLIENT BODY SIZE
    # =========================================================================
    
    client_max_body_size 100M;
    client_body_buffer_size 128k;
}
