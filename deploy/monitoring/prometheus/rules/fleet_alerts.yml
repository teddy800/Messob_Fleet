# Alert Rules for MESSOB Fleet Management System
# NFR-4.1: 99.9% Availability Monitoring

groups:
  - name: fleet_critical_alerts
    interval: 30s
    rules:
      # Service availability
      - alert: OdooServiceDown
        expr: up{job="odoo18"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Odoo service is down"
          description: "Odoo18 instance has been down for more than 2 minutes"

      - alert: PostgresDown
        expr: up{job="postgres16"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL 16 database is unreachable"

      # Performance alerts (NFR-1.1: <500ms response time)
      - alert: HighAPIResponseTime
        expr: http_request_duration_seconds{quantile="0.95"} > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time exceeds 500ms (SRS NFR-1.1)"
          description: "95th percentile response time is {{ $value }}s"

      - alert: CriticalAPIResponseTime
        expr: http_request_duration_seconds{quantile="0.95"} > 2
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "API response time critically high"
          description: "95th percentile response time is {{ $value }}s (SRS violation)"

      # Resource alerts
      - alert: HighCPUUsage
        expr: (100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for 10 minutes"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Less than 15% disk space available"

      # Database alerts
      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of database connections"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_statements_mean_exec_time[5m]) > 500
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected (>500ms)"
          description: "Average query time is {{ $value }}ms"

      # GPS tracking performance (NFR-1.2: 1000+ GPS updates/min)
      - alert: GPSUpdateRateLow
        expr: rate(gps_position_updates_total[1m]) < 16.67
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPS update rate below expected threshold"
          description: "Current rate: {{ $value }}/sec (Expected: >16.67/sec for 1000/min)"

      # WebSocket connection issues
      - alert: WebSocketConnectionFailures
        expr: rate(websocket_connection_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connection failures detected"
          description: "Connection error rate: {{ $value }}/sec"

  - name: fleet_business_alerts
    interval: 60s
    rules:
      # Pending requests backlog
      - alert: PendingRequestsBacklog
        expr: trip_requests_pending_count > 50
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Large number of pending trip requests"
          description: "{{ $value }} requests pending for over 30 minutes"

      # Vehicle utilization
      - alert: LowVehicleUtilization
        expr: (vehicles_active_count / vehicles_total_count) * 100 < 30
        for: 2h
        labels:
          severity: info
        annotations:
          summary: "Low vehicle utilization rate"
          description: "Only {{ $value }}% of fleet is active"

      # Maintenance alerts overdue
      - alert: OverdueMaintenanceAlerts
        expr: maintenance_alerts_overdue_count > 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Multiple overdue maintenance alerts"
          description: "{{ $value }} maintenance items are overdue"
