# Prometheus Configuration for MESSOB Fleet Management System
# Monitors: Odoo, PostgreSQL, System Metrics
# Alert Rules: CPU, Memory, Disk, API Response Time

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'messob-fleet'
    environment: 'production'

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Odoo 18 monitoring (main production instance)
  - job_name: 'odoo18'
    static_configs:
      - targets: ['odoo18:8069']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL 16 database monitoring
  - job_name: 'postgres16'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Node/System metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Blackbox exporter for endpoint health checks
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://localhost:8018/web/health
          - http://localhost:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # WebSocket server monitoring
  - job_name: 'websocket'
    static_configs:
      - targets: ['odoo18:8069']
    metrics_path: '/messob/ws/metrics'
    scrape_interval: 30s

  # API performance monitoring
  - job_name: 'api-performance'
    static_configs:
      - targets: ['odoo18:8069']
    metrics_path: '/messob/api/metrics'
    scrape_interval: 60s
