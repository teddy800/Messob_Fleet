[options]
; Odoo Configuration for Render Deployment
; This config handles SSL connections to PostgreSQL

; Database Settings - These will be overridden by environment variables
db_host = localhost
db_port = 5432
db_user = odoo
db_password = odoo
db_maxconn = 32
db_template = template0

; SSL Mode for PostgreSQL - Required for Render
; Using 'allow' mode which attempts SSL but falls back gracefully
; This is the most permissive mode that still supports SSL
db_sslmode = allow

; Server Settings - Reduced for free tier
http_port = 8069
workers = 0
max_cron_threads = 1

; Addons
addons_path = /mnt/extra-addons

; Logging
log_level = info
log_handler = :INFO

; Disable demo data
without_demo = all

; Security
admin_passwd = False
list_db = True
proxy_mode = True
