[options]
; Odoo Configuration for Render Deployment
; This config handles SSL connections to PostgreSQL

; Database Settings - These will be overridden by environment variables
db_host = localhost
db_port = 5432
db_user = odoo
db_password = odoo
db_maxconn = 32
db_template = template0

; SSL Mode for PostgreSQL - Required for Render
; Using 'require' mode which enforces SSL but doesn't verify certificates
db_sslmode = require

; Server Settings - Reduced for free tier
http_port = 8069
workers = 0
max_cron_threads = 1

; Addons
addons_path = /mnt/extra-addons

; Logging
log_level = info
log_handler = :INFO

; Disable demo data
without_demo = all

; Security
; Master password for database operations
; Using a fixed password temporarily to create the database
; TODO: Change this after database is created
admin_passwd = MessobFleet2024!Secure
list_db = True
proxy_mode = True
